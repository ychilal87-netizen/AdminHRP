<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRP Admin | VIP & Balance Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .tab-active { background: #eab308 !important; color: #000 !important; font-weight: 900; box-shadow: 0 5px 15px rgba(234, 179, 8, 0.4); }
        .vip-badge { background: linear-gradient(135deg, #eab308, #ca8a04); color: black; padding: 2px 10px; border-radius: 99px; font-size: 10px; font-weight: 900; }
        input { background: rgba(15, 23, 42, 0.9) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
    </style>
</head>
<body class="pb-10">

    <div class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur-md border-b border-white/5 p-4 flex justify-between items-center">
        <div>
            <h1 class="text-lg font-black text-yellow-500 italic uppercase">HRP Manager</h1>
            <p id="sync-status" class="text-[9px] text-green-400 font-bold uppercase tracking-widest font-mono">● Active</p>
        </div>
        <button onclick="loadData()" class="bg-yellow-500 text-black w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>

    <div class="p-4 space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="glass-card p-4 border-l-4 border-blue-500">
                <p class="text-gray-400 text-[10px] font-bold uppercase">ጠቅላላ ደንበኞች</p>
                <h3 id="total-users" class="text-2xl font-black italic text-white">0</h3>
            </div>
            <div class="glass-card p-4 border-l-4 border-yellow-500">
                <p class="text-gray-400 text-[10px] font-bold uppercase">ጥያቄዎች</p>
                <h3 id="total-pending" class="text-2xl font-black text-yellow-500 italic">0</h3>
            </div>
        </div>

        <!-- Search Section with Icons -->
        <div class="space-y-2">
            <div class="relative flex items-center">
                <i class="fas fa-search absolute left-4 text-gray-400 text-sm pointer-events-none"></i>
                <input type="text" id="adminSearch" oninput="filterAll()" placeholder="በስልክ ወይም በስም ፈልግ..." class="w-full pl-11 pr-4 py-3 rounded-xl outline-none text-sm border border-white/10">
            </div>
            <div class="relative flex items-center">
                <i class="fas fa-users absolute left-4 text-gray-400 text-sm pointer-events-none"></i>
                <input type="text" id="teamSearch" oninput="filterAll()" placeholder="በጋባዥ ኮድ (Team) ፈልግ..." class="w-full pl-11 pr-4 py-3 rounded-xl outline-none text-sm border border-white/10">
            </div>
        </div>

        <div class="flex bg-slate-900 rounded-2xl p-1 shadow-inner">
            <button onclick="toggleView('users')" id="btn-users" class="flex-1 py-3.5 rounded-xl text-xs font-black transition tab-active uppercase">Users</button>
            <button onclick="toggleView('requests')" id="btn-requests" class="flex-1 py-3.5 rounded-xl text-xs font-black transition text-gray-500 uppercase">Requests</button>
        </div>

        <div id="view-users" class="space-y-4">
            <div id="users-container" class="space-y-4"></div>
        </div>

        <div id="view-requests" class="hidden space-y-4">
            <div id="requests-container" class="space-y-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE_60krnzvt-40JavcDEABzf0JqbeBZZY",
            authDomain: "house-rent-project-f16dd.firebaseapp.com",
            databaseURL: "https://house-rent-project-f16dd-default-rtdb.firebaseio.com",
            projectId: "house-rent-project-f16dd",
            storageBucket: "house-rent-project-f16dd.firebasestorage.app",
            messagingSenderId: "76197922139",
            appId: "1:76197922139:web:d4eea517c1c04b2496467e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUsers = {};

        window.loadData = async () => {
            document.getElementById('sync-status').innerText = "SYNCING...";
            const [uSnap, rSnap] = await Promise.all([get(ref(db, 'users')), get(ref(db, 'records'))]);
            
            currentUsers = {};
            if(uSnap.exists()) {
                uSnap.forEach(u => {
                    const cleanKey = u.key.replace(/[^0-9]/g, "");
                    currentUsers[cleanKey] = { ...u.val(), id: u.key };
                });
            }

            renderUsers();
            renderRequests(rSnap);
            document.getElementById('total-users').innerText = Object.keys(currentUsers).length;
            document.getElementById('sync-status').innerText = "● ONLINE";
        };

        function renderUsers() {
            let html = "";
            Object.values(currentUsers).forEach(u => {
                html += `
                <div class="glass-card p-4 space-y-3 user-item" 
                     data-search="${u.id} ${u.fullName || ''}" 
                     data-team="${(u.inviteBy || '').toUpperCase()}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-yellow-500 font-black text-sm">${u.id}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${u.fullName || 'NO NAME'}</p>
                        </div>
                        <div class="text-right">
                            <span class="vip-badge">VIP ${u.vip || 0}</span>
                            <p class="text-green-400 font-black text-sm mt-1">${(u.balance || 0).toFixed(2)} ETB</p>
                        </div>
                    </div>
                    
                    <div class="bg-black/40 p-3 rounded-xl text-[10px] space-y-1 border border-white/5">
                        <div class="flex justify-between"><span>Bank:</span> <span class="text-white font-bold">${u.bankName || '---'}</span></div>
                        <div class="flex justify-between"><span>Acc:</span> <span class="text-white font-mono">${u.bankAcc || '---'}</span></div>
                        <div class="flex justify-between pt-1 border-t border-white/5"><span>Invited By:</span> <span class="text-blue-400 font-bold">${u.inviteBy || 'Direct'}</span></div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="controlVIP('${u.id}', ${u.vip || 0})" class="flex-1 bg-yellow-500/10 text-yellow-500 py-2.5 rounded-xl text-[10px] font-black border border-yellow-500/20 active:bg-yellow-500 active:text-black transition">
                           VIP ቀይር
                        </button>
                        <button onclick="controlBalance('${u.id}', ${u.balance || 0})" class="flex-1 bg-green-500/10 text-green-400 py-2.5 rounded-xl text-[10px] font-black border border-green-500/20 active:bg-green-500 active:text-black transition">
                           ብር ቀይር
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('users-container').innerHTML = html;
        }

        function renderRequests(snap) {
            let html = "";
            let count = 0;
            if(snap.exists()) {
                snap.forEach(userFolder => {
                    userFolder.forEach(rec => {
                        const d = rec.val();
                        if(d.status === "Pending") {
                            count++;
                            const u = currentUsers[userFolder.key.replace(/[^0-9]/g, "")] || {};
                            const isDep = d.type === "Deposit";
                            html += `
                            <div class="glass-card p-4 border-l-4 ${isDep ? 'border-green-500' : 'border-red-500'}">
                                <div class="flex justify-between text-[11px] mb-2 text-gray-400 font-black uppercase"><span>${userFolder.key}</span><span>${d.type}</span></div>
                                <h4 class="text-xl font-black text-white mb-3">${d.amount} ETB</h4>
                                <div class="bg-black/50 p-3 rounded-xl text-[10px] mb-4 space-y-1">
                                    ${isDep ? `<div>FT Ref: <span class="text-yellow-500 font-bold font-mono">${d.ft || '---'}</span></div>` : 
                                    `<div>ባንክ: <span class="text-blue-400 font-bold">${u.bankName || '---'}</span></div>
                                     <div>አካውንት: <span class="text-white font-mono">${u.bankAcc || '---'}</span></div>
                                     <div>ስም: <span class="text-white font-bold">${u.fullName || '---'}</span></div>`}
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="txAction('${userFolder.key}', '${rec.key}', 'Approved', '${d.type}', ${d.amount})" class="flex-1 bg-green-600 py-3 rounded-xl text-[11px] font-black uppercase">Approve</button>
                                    <button onclick="txAction('${userFolder.key}', '${rec.key}', 'Rejected', '${d.type}', ${d.amount})" class="flex-1 bg-red-600 py-3 rounded-xl text-[11px] font-black uppercase">Reject</button>
                                </div>
                            </div>`;
                        }
                    });
                });
            }
            document.getElementById('requests-container').innerHTML = html || '<p class="text-center py-20 text-gray-500 italic">No pending requests.</p>';
            document.getElementById('total-pending').innerText = count;
        }

        // --- Controls ---

        window.controlVIP = async (id, currentVip) => {
            const newVal = prompt(`የ ${id} አዲስ VIP ያስገቡ (0-5):\nአሁን ያለው: VIP ${currentVip}`, currentVip);
            if(newVal !== null && newVal !== "") {
                const vipLevel = parseInt(newVal);
                if(vipLevel >= 0 && vipLevel <= 5) {
                    await update(ref(db, `users/${id}`), { vip: vipLevel });
                    alert(`ተሳክቷል! ${id} ወደ VIP ${vipLevel} ተቀይሯል።`);
                    loadData();
                } else {
                    alert("እባክህ ከ 0 እስከ 5 ያለ ቁጥር ተጠቀም!");
                }
            }
        };

        window.controlBalance = async (id, currentBal) => {
            const newVal = prompt(`የ ${id} አዲስ የብር መጠን ያስገቡ:\nአሁን ያለው: ${currentBal} ETB`, currentBal);
            if(newVal !== null && newVal !== "") {
                const balAmount = parseFloat(newVal);
                if(!isNaN(balAmount)) {
                    await update(ref(db, `users/${id}`), { balance: balAmount });
                    alert(`ተሳክቷል! የ ${id} ሂሳብ ወደ ${balAmount} ETB ተቀይሯል።`);
                    loadData();
                } else {
                    alert("እባክህ ትክክለኛ የብር መጠን ያስገቡ!");
                }
            }
        };

        // --- Search Logic ---
        window.filterAll = () => {
            const searchQ = document.getElementById('adminSearch').value.toLowerCase();
            const teamQ = document.getElementById('teamSearch').value.toUpperCase();
            
            document.querySelectorAll('.user-item').forEach(box => {
                const dataText = box.getAttribute('data-search').toLowerCase();
                const teamText = box.getAttribute('data-team');
                
                const matchesSearch = dataText.includes(searchQ);
                const matchesTeam = teamQ === "" || teamText === teamQ;
                
                box.style.display = (matchesSearch && matchesTeam) ? 'block' : 'none';
            });
        };

        window.txAction = async (uk, rk, s, t, a) => {
            try {
                // Firebase path key ማጽዳት (ስልክ ቁጥር ብቻ እንዲሆን)
                const cleanUk = uk.replace(/[^0-9]/g, "");
                const uRef = ref(db, `users/${cleanUk}`);
                const rRef = ref(db, `records/${uk}/${rk}`);
                
                if(s === "Approved" && t === "Deposit") {
                    const snap = await get(uRef);
                    if(snap.exists()) await update(uRef, { balance: (snap.val().balance || 0) + a });
                } else if(s === "Rejected" && t === "Withdraw") {
                    // ዊዝድሮው ሪጀክት ሲደረግ ብሩ ወደ ተጠቃሚው አካውንት ይመለሳል (ይደመራል)
                    const snap = await get(uRef);
                    if(snap.exists()) await update(uRef, { balance: (snap.val().balance || 0) + a });
                }
                await update(rRef, { status: s });
                loadData();
            } catch(e) { alert(e.message); }
        };

        window.toggleView = (v) => {
            document.getElementById('view-users').classList.toggle('hidden', v !== 'users');
            document.getElementById('view-requests').classList.toggle('hidden', v !== 'requests');
            document.getElementById('btn-users').className = `flex-1 py-3.5 rounded-xl text-xs font-black transition ${v === 'users' ? 'tab-active' : 'text-gray-500'}`;
            document.getElementById('btn-requests').className = `flex-1 py-3.5 rounded-xl text-xs font-black transition ${v === 'requests' ? 'tab-active' : 'text-gray-500'}`;
        };

        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
